name: Build APK

on:
  push:
    branches: [master, main, '*-feat-*', '*-fix-*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 新版 cmdline-tools / sdkmanager 需要较新 JDK
      - name: Set up JDK 17 for SDK tools
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-29 build-tools;28.0.3'

      - name: Prepare local.properties
        run: |
          set -e
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "==== env ===="
          echo "ANDROID_HOME=$ANDROID_HOME"
          cat local.properties
          ls -la "$ANDROID_HOME" || true
          ls -la "$ANDROID_HOME/platforms" || true
          ls -la "$ANDROID_HOME/build-tools" || true

      # AGP 3.5.3 + Gradle 5.5 需要 JDK 8
      - name: Set up JDK 8 for Gradle build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: |
          set -e
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TiebaLite-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
