name: Build APK

on:
  push:
    branches: [master, main, '*-feat-*', '*-fix-*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 for Android SDK tools
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Android SDK packages
        run: |
          set -euo pipefail
          ANDROID_HOME="$HOME/android-sdk"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp
          curl -fsSL -o cmdtools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdtools.zip -d "$ANDROID_HOME/cmdline-tools"
          rm -f cmdtools.zip
          if [ -d "$ANDROID_HOME/cmdline-tools/cmdline-tools" ]; then
            mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          fi
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_HOME" --licenses >/dev/null || true
          "$SDKMANAGER" --sdk_root="$ANDROID_HOME" \
            "platforms;android-29" \
            "build-tools;28.0.3" \
            "platform-tools"
          echo "sdk.dir=$ANDROID_HOME" > "$GITHUB_WORKSPACE/local.properties"

      - name: Set up JDK 8 for project build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: |
          set -euo pipefail
          java -version
          echo "ANDROID_HOME=$ANDROID_HOME"
          cat local.properties
          ./gradlew assembleDebug --no-daemon --stacktrace --info | tee build.log
          # 失败时保留关键错误摘要
          if [ ! -f app/build/outputs/apk/debug/*.apk ] 2>/dev/null; then
            echo "==== ERROR SUMMARY ===="
            grep -E "FAILED|What went wrong|Could not|error:|Exception|BUILD FAILED" build.log | tail -80 || true
          fi
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TiebaLite-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
