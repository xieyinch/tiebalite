name: Build APK

on:
  push:
    branches: [master, main, '*-feat-*', '*-fix-*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 预装 Android SDK / JDK 的构建环境，避免新版 sdkmanager 与老 AGP 冲突
    container:
      image: mingc/android-build-box:1.25.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare local.properties
        run: |
          set -e
          if [ -n "${ANDROID_HOME:-}" ]; then
            echo "sdk.dir=$ANDROID_HOME" > local.properties
          elif [ -n "${ANDROID_SDK_ROOT:-}" ]; then
            echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          else
            # 常见路径兜底
            for d in /opt/android-sdk /usr/local/android-sdk /android-sdk $HOME/Android/Sdk; do
              if [ -d "$d" ]; then
                echo "sdk.dir=$d" > local.properties
                export ANDROID_HOME="$d"
                echo "ANDROID_HOME=$d" >> "$GITHUB_ENV"
                break
              fi
            done
          fi
          echo "==== env ===="
          java -version || true
          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          cat local.properties || true
          ls -la "${ANDROID_HOME:-/opt/android-sdk}" || true

      - name: Install platform 29 if missing
        run: |
          set -e
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/opt/android-sdk}}"
          if [ ! -d "$SDK/platforms/android-29" ]; then
            yes | sdkmanager --sdk_root="$SDK" "platforms;android-29" "build-tools;28.0.3" "platform-tools" || true
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: |
          set -e
          export ANDROID_HOME="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/opt/android-sdk}}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TiebaLite-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
